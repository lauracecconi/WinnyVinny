[build]
  # Build the Vinny Golf React app; output lands in games/vinny-golf
  # (see vite.config.js "outDir"). The homepage and Alpine Rush are
  # already static files, so nothing else needs building.
  command = "cd games/vinny-golf-src && npm install && npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Don't publish the React source files -- only the built output
[[redirects]]
  from = "/games/vinny-golf-src/*"
  to = "/404.html"
  status = 404
